<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Errata</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <span class="brand">Errata</span>
      <nav>
        <button id="btn-verbose" class="nav-btn">Verbose</button>
        <button id="btn-models" class="nav-btn">Models</button>
        <button id="btn-stats" class="nav-btn">Stats</button>
      </nav>
    </header>
    <main id="main"></main>
    <footer id="input-area">
      <textarea id="prompt-input" placeholder="Connecting…" rows="3" disabled></textarea>
      <button id="btn-send" disabled>Send →</button>
    </footer>
  </div>
  <div id="models-backdrop" class="models-backdrop"></div>
  <div id="models-panel" class="models-panel">
    <div class="models-panel-header">
      <span>Models</span>
      <button id="btn-models-close" class="models-close-btn">×</button>
    </div>
    <div class="models-panel-search">
      <input id="models-search" type="text" placeholder="Filter models…" autocomplete="off">
    </div>
    <div id="models-panel-body" class="models-panel-body"></div>
    <div class="models-panel-footer">
      <button id="btn-models-apply" class="btn-models-apply">Apply</button>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
