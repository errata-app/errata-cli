<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Errata</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <span class="brand">Errata</span>
      <nav>
        <button id="btn-verbose" class="nav-btn">Verbose</button>
        <button id="btn-models" class="nav-btn">Models</button>
        <button id="btn-stats" class="nav-btn">Stats</button>
      </nav>
    </header>
    <main id="main"></main>
    <footer id="input-area">
      <textarea id="prompt-input" placeholder="Enter a prompt… (Shift+Enter for newline)" rows="3"></textarea>
      <button id="btn-send">Send →</button>
    </footer>
  </div>
  <script src="app.js"></script>
</body>
</html>
